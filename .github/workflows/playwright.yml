# Playwright E2E — push/PR 시 자동 실행
# 기본 baseURL은 playwright.config.ts의 호스팅 URL. 다른 주소로 돌리려면 PLAYWRIGHT_BASE_URL 변수를 설정하세요.

name: Playwright

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 노드 설치
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: package-lock.json 그대로 의존성 설치
        run: npm ci

      - name: Playwright 브라우저 설치
        run: npx playwright install --with-deps

      - name: Playwright 테스트 실행
        run: npm test

      - name: Playwright 리포트 업로드
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
