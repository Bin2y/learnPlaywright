# Playwright E2E — push/PR 시 자동 실행
# 기본 baseURL은 playwright.config.ts의 호스팅 URL. 다른 주소로 돌리려면 PLAYWRIGHT_BASE_URL 변수를 설정하세요.

name: Playwright

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 노드 설치
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: package-lock.json 그대로 의존성 설치
        run: npm ci

      - name: Playwright 브라우저 설치 (PR — Chromium만)
        if: ${{ github.event_name == 'pull_request' }}
        run: npx playwright install --with-deps chromium

      - name: Playwright 브라우저 설치 (main/master·수동 — 전 매트릭스)
        if: ${{ github.event_name != 'pull_request' }}
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Playwright 스모크 테스트 실행 (PR)
        if: ${{ github.event_name == 'pull_request' }}
        run: npm run test:smoke

      - name: Playwright 전체 테스트 실행 (main/master push 또는 수동 실행)
        if: ${{ github.event_name != 'pull_request' }}
        run: npm run test:ci-matrix

      - name: Playwright 리포트 업로드
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  discord-notify:
    name: Discord 알림
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Discord 알림 전송
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ needs.test.result }}
          REF_NAME: ${{ github.ref_name }}
          SHA_FULL: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message || github.event.pull_request.title || 'N/A' }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL secret이 없어 Discord 알림을 건너뜁니다."
            exit 0
          fi

          python3 <<'PY' | curl -sS -f -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data-binary @-
          import json
          import os

          def trunc(s: str, n: int = 900) -> str:
              s = (s or "").replace("\r\n", "\n").strip()
              return s if len(s) <= n else s[: n - 1] + "…"

          status = os.environ["JOB_STATUS"]
          labels = {
              "success": "✅ 성공",
              "failure": "❌ 실패",
              "cancelled": "⚠️ 취소",
              "skipped": "⏭️ 건너뜀",
          }
          colors = {
              "success": 0x57F287,
              "failure": 0xED4245,
              "cancelled": 0xFAA61A,
              "skipped": 0x95A5A6,
          }
          state = labels.get(status, f"❓ {status}")
          color = colors.get(status, 0x95A5A6)

          repo = os.environ["REPO"]
          run_id = os.environ["RUN_ID"]
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}"
          sha = os.environ["SHA_FULL"][:7]
          msg = trunc(os.environ.get("COMMIT_MSG", "")) or "(없음)"

          payload = {
              "embeds": [
                  {
                      "title": os.environ["WORKFLOW_NAME"],
                      "color": color,
                      "fields": [
                          {"name": "상태", "value": state, "inline": True},
                          {"name": "브랜치", "value": os.environ["REF_NAME"], "inline": True},
                          {"name": "커밋", "value": f"`{sha}`", "inline": True},
                          {"name": "커밋 메시지", "value": msg, "inline": False},
                          {
                              "name": "실행",
                              "value": f"[GitHub Actions 실행 보기]({run_url}) — 아티팩트(playwright-report)에서 리포트 다운로드 가능",
                              "inline": False,
                          },
                      ],
                  }
              ]
          }
          print(json.dumps(payload, ensure_ascii=False))
          PY
